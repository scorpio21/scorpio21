name: 🪄 Actualizar PAGINA DE SCORPIO automáticamente

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el repositorio
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar script
        run: python scripts/update-readme.py

      - name: Guardar cambios
        run: |
          git config user.name "scorpio21"
          git config user.email "12345678+scorpio21@users.noreply.github.com"

          export GIT_AUTHOR_NAME="scorpio21"
          export GIT_AUTHOR_EMAIL="12345678+scorpio21@users.noreply.github.com"
          export GIT_COMMITTER_NAME="scorpio21"
          export GIT_COMMITTER_EMAIL="12345678+scorpio21@users.noreply.github.com"

          echo "=== Contenido de cries ==="
          ls -la cries || true

          git add README.md
          git add cries/

          if git diff --cached --quiet; then
            echo "No hay cambios."
            exit 0
          fi
          
          echo "===== GIT CONFIG ====="
          git config --list

          echo "===== AUTHOR ====="
          git var GIT_AUTHOR_IDENT

          echo "===== COMMITTER ====="
          git var GIT_COMMITTER_IDENT
          
          git commit \
            --author="scorpio21 <12345678+scorpio21@users.noreply.github.com>" \
            -m "🪄 Actualización diaria automática: Pokémon y frase gamer"

          git push
